<section class="entry" id="injected-entry-0"><h2>نَهْضَل<span class="tag">[صِفَة]</span></h2><div class="sense"><div class="date">ن145هـ=762م</div><p class="def"><b class="hl">  النَّهْضَلُ  </b>  : المُسِنُّ.</p><div class="poetry"><div>كَأَنَّهَا أَلْوَاحُ بَازٍ <b class="hl">نَهْضَلِ</b> كُرَّزِ، يُلْقِي رِيشَهُ، وَيَفْتَلِي</div></div><div class="author">رؤبة بن العجّاج</div><div class="ref">المصايد والمطارد: كُشاجم (ت، 360هـ)، حقّقه وعلّق عليه: محمّد أسعد طلس، دار اليقظة- مطبعة دار المعرفة، بغداد، د.ت. ‏62‏.</div></div></section>
